version: 1
policy: agent-permissions

principles:
  - least-privilege
  - explicit-delegation
  - traceable-side-effects

agents:
  pm:
    may_write:
      - ".samourai/docai/changes/**/chg-*-pm-notes.yaml"
    may_execute_commands: false
    may_commit: false
    may_open_pr: false
    may_delegate_to:
      - spec-writer
      - test-plan-writer
      - plan-writer
      - coder
      - reviewer
      - runner
      - fixer
      - doc-syncer
      - committer
      - pr-manager
      - gap-analysis
      - verdict
      - refactor
      - jira-analysis

  spec-writer:
    may_write:
      - ".samourai/docai/changes/**/chg-*-spec.md"
    may_execute_commands: false
    may_commit: false

  test-plan-writer:
    may_write:
      - ".samourai/docai/changes/**/chg-*-test-plan.md"
    may_execute_commands: false
    may_commit: false

  plan-writer:
    may_write:
      - ".samourai/docai/changes/**/chg-*-plan.md"
    may_execute_commands: false
    may_commit: false

  coder:
    may_write:
      - "**"
    may_execute_commands: true
    may_commit: false

  reviewer:
    may_write:
      - ".samourai/docai/changes/**/chg-*-plan.md"
      - ".samourai/docai/changes/**/code-review/**"
    may_execute_commands: true
    may_commit: false

  runner:
    may_write:
      - ".samourai/tmpai/**"
    may_execute_commands: true
    may_commit: false

  fixer:
    may_write:
      - "**"
    may_execute_commands: true
    may_commit: false

  doc-syncer:
    may_write:
      - ".samourai/docai/spec/**"
      - ".samourai/docai/contracts/**"
      - ".samourai/docai/domain/**"
      - ".samourai/docai/quality/**"
      - ".samourai/docai/ops/**"
      - ".samourai/docai/guides/**"
    may_execute_commands: false
    may_commit: false

  committer:
    may_write:
      - "**"
    may_execute_commands: true
    may_commit: true

  pr-manager:
    may_write:
      - ".samourai/tmpai/pr/**"
    may_execute_commands: true
    may_commit: false
    may_open_pr: true

  gap-analysis:
    may_write:
      - ".samourai/docai/changes/**/gap-analysis-report.md"
    may_execute_commands: false
    may_commit: false

  verdict:
    may_write:
      - ".samourai/docai/changes/**/verdict-report.md"
    may_execute_commands: true
    may_commit: false

  refactor:
    may_write:
      - "**"
    may_execute_commands: true
    may_commit: false

  jira-analysis:
    may_write:
      - ".samourai/docai/changes/**/ticket-analysis-report.md"
    may_execute_commands: false
    may_commit: false
